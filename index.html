<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDesk Pro | Teacher Portal</title>
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .premium-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .midnight-header { background-color: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-inactive { opacity: 0.15; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [wizardStep, setWizardStep] = useState(1);
            const [wizardData, setWizardData] = useState({ class: null, subject: null, chapters: [] });
            
            // Empty State initialized
            const [students, setStudents] = useState([]);

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const financialStats = useMemo(() => {
                let rec = 0;
                let due = 0;
                students.forEach(s => {
                    const paidCount = s.payments.filter(p => p === 'Paid').length;
                    const dueCount = 12 - paidCount;
                    rec += (paidCount * s.amount) + (s.advance || 0);
                    due += (dueCount * s.amount);
                });
                return { rec, due };
            }, [students]);

            const renderHome = () => (
                <div className="animate-in">
                    {/* Compact One-Line White Welcome Header */}
                    <div className="midnight-header text-white p-6 md:p-8 rounded-b-[2.5rem] shadow-2xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <h1 className="text-xl md:text-2xl font-bold tracking-tight">
                                    Good morning, <span className="text-white font-extrabold underline decoration-amber-400">Prof. Sharma</span> ✦ <span className="text-slate-400 font-normal text-sm ml-2 hidden lg:inline">AI Teaching Command Centre</span>
                                </h1>
                            </div>

                            <div className="flex gap-8 border-l border-white/10 pl-8">
                                <div><p className="text-lg font-bold">0</p><p className="text-[8px] font-black uppercase text-slate-500 tracking-widest">Active Classes</p></div>
                                <div><p className="text-lg font-bold">{students.length}</p><p className="text-[8px] font-black uppercase text-slate-500 tracking-widest">Students</p></div>
                                <div><p className="text-lg font-bold text-emerald-400">Rs. {financialStats.rec}</p><p className="text-[8px] font-black uppercase text-slate-500 tracking-widest">Collection</p></div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto p-8 space-y-12">
                        <section>
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Operations</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <ActionCard icon="file-text" iconColor="text-indigo-500" title="Question Maker" desc="Grade 1-10 Paper Builder." badge="NEW" onClick={() => {setView('questions'); setWizardStep(1);}} />
                                <ActionCard icon="book-open" iconColor="text-emerald-500" title="Make Notes" desc="Create smart study material." onClick={() => setView('notes')} />
                                <ActionCard icon="calendar" iconColor="text-amber-500" title="Class Calendar" desc="Schedule weekly sessions." onClick={() => setView('calendar')} />
                                <ActionCard icon="wallet" iconColor="text-rose-500" title="Payment Check" desc="Fee ledger & student dues." onClick={() => setView('payments')} />
                            </div>
                        </section>

                        <section>
                            <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Active Schedule</h2>
                            <div className="bg-white rounded-[2.5rem] border border-slate-100 premium-shadow p-12 text-center">
                                <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto text-slate-200 mb-4">
                                    <Icon name="calendar-days" size={32} />
                                </div>
                                <p className="text-slate-400 font-bold text-sm">No classes scheduled for today.</p>
                            </div>
                        </section>
                    </div>
                </div>
            );

            const renderPayments = () => (
                <div className="max-w-6xl mx-auto p-8 animate-in">
                    <button onClick={() => setView('home')} className="flex items-center gap-2 text-slate-400 hover:text-slate-900 font-bold text-xs mb-10"><Icon name="chevron-left" size={16}/> BACK</button>
                    <div className="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
                        <div>
                            <h2 className="text-4xl font-black tracking-tighter text-slate-900">Finance Ledger</h2>
                            <p className="text-slate-500 font-medium mt-1 uppercase text-[10px] tracking-widest">Student Fee Database</p>
                        </div>
                        <button className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                            <Icon name="plus" size={18} /> Add Student
                        </button>
                    </div>

                    {students.length === 0 ? (
                        <div className="bg-white p-20 rounded-[3rem] text-center border border-dashed border-slate-200">
                             <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto text-slate-200 mb-6"><Icon name="users" size={40}/></div>
                             <h3 className="text-xl font-bold text-slate-800">No Students Found</h3>
                             <p className="text-slate-400 mt-2">Start by adding your first student to track payments.</p>
                        </div>
                    ) : (
                        <div className="bg-white rounded-[3rem] border border-slate-100 shadow-xl overflow-hidden">
                            {/* Table logic here (same as before) */}
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="h-20 midnight-header text-white flex items-center justify-between px-10 border-b border-white/5 sticky top-0 z-[60]">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-amber-400 p-2.5 rounded-2xl text-[#0f172a] shadow-xl">
                                <Icon name="graduation-cap" size={24} />
                            </div>
                            <span className="text-2xl font-black tracking-tighter uppercase">Edu<span className="text-amber-400">Desk</span></span>
                        </div>
                        <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center text-xs font-black border border-white/10">PS</div>
                    </nav>

                    <main className="pb-20">
                        {view === 'home' && renderHome()}
                        {view === 'payments' && renderPayments()}
                        {view === 'questions' && (
                            <div className="p-20 text-center animate-in">
                                <h2 className="text-3xl font-black mb-4">Question Maker Wizard</h2>
                                <p className="text-slate-400 mb-8">System ready to generate assessments.</p>
                                <button onClick={() => setView('home')} className="px-10 py-3 bg-indigo-600 text-white rounded-xl font-bold">Back</button>
                            </div>
                        )}
                        {(view === 'notes' || view === 'calendar') && (
                            <div className="p-20 text-center space-y-6 animate-in">
                                <div className="w-24 h-24 bg-slate-100 rounded-[2.5rem] flex items-center justify-center mx-auto text-slate-300"><Icon name="lock" size={48} /></div>
                                <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase">Module Locked</h2>
                                <p className="text-slate-400 font-medium">Please add student data first to activate these features.</p>
                                <button onClick={() => setView('home')} className="px-10 py-3 bg-indigo-600 text-white rounded-2xl font-bold">Return Home</button>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 bg-[#0f172a] text-slate-600 text-center text-[10px] font-bold uppercase tracking-[0.3em] border-t border-white/5">
                        EduDesk Teacher Portal • AI Powered • © 2026
                    </footer>
                </div>
            );
        };

        const ActionCard = ({ icon, iconColor, title, desc, badge, onClick }) => (
            <div onClick={onClick} className="bg-white p-8 rounded-[2.5rem] border border-slate-50 premium-shadow hover:-translate-y-3 transition-all cursor-pointer group relative flex flex-col items-start overflow-hidden">
                {badge && <span className="absolute top-6 right-6 px-3 py-1 bg-amber-400 text-[#0f172a] text-[8px] font-black rounded-full uppercase tracking-widest">{badge}</span>}
                <div className={`w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform ${iconColor}`}>
                    <Icon name={icon} size={24} />
                </div>
                <h3 className="text-lg font-extrabold text-slate-900 mb-1 tracking-tight uppercase">{title}</h3>
                <p className="text-slate-400 text-[11px] font-bold leading-relaxed">{desc}</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
